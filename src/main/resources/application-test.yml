spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/wolfcalie_test?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${TEST_DB_USERNAME:root}
    password: ${TEST_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret-key: ${TEST_JWT_SECRET_KEY:ThisIsADefaultSecretKeyForTestingPurposesOnly1234567890}
  access-token-expiration: 900
  refresh-token-expiration: 604800
